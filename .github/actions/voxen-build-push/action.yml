name: 'Voxen Build & Push'
description: 'Build with Voxen, dockerize, and push to registry'
author: 'Voxen'

inputs:
  profile:
    description: 'Build profile (dev, staging, prod)'
    required: false
    default: 'dev'
  tag:
    description: 'Docker image tag (e.g. ghcr.io/user/app:1.0.0)'
    required: true
  push:
    description: 'Push to registry'
    required: false
    default: 'true'
  platforms:
    description: 'Target platforms (comma-separated)'
    required: false
    default: 'linux/amd64,linux/arm64'
  sign:
    description: 'Sign image with Cosign'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build with Voxen
      shell: bash
      run: |
        voxen build --profile ${{ inputs.profile }} --json
      env:
        VOXEN_PROFILE: ${{ inputs.profile }}

    - name: Dockerize with Voxen
      shell: bash
      run: |
        PUSH_FLAG=""
        if [[ "${{ inputs.push }}" == "true" ]]; then
          PUSH_FLAG="--push"
        fi
        PLATFORM_FLAG=""
        if [[ -n "${{ inputs.platforms }}" ]]; then
          PLATFORM_FLAG="--platform ${{ inputs.platforms }}"
        fi
        SIGN_FLAG=""
        if [[ "${{ inputs.sign }}" == "true" ]]; then
          SIGN_FLAG="--sign"
        fi
        voxen dockerize \
          --tag ${{ inputs.tag }} \
          $PUSH_FLAG \
          $PLATFORM_FLAG \
          $SIGN_FLAG \
          --lint \
          --json

    - name: Sign with Cosign
      if: ${{ inputs.sign == 'true' }}
      shell: bash
      run: |
        cosign sign --yes ${{ inputs.tag }}

    - name: Scan with Trivy
      if: ${{ inputs.push == 'true' }}
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ inputs.tag }}
        format: sarif
        output: ${{ runner.temp }}/trivy-results.sarif

branding:
  icon: 'package'
  color: 'purple'
