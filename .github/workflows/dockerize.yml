name: Voxen Dockerize CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build-and-dockerize:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build fat JAR
        run: ./gradlew build :cli:fatJar --no-daemon
        shell: bash

      - name: Show Voxen info
        run: |
          java -jar cli/build/libs/voxen-*.jar --json info
        shell: bash

      - name: Determine image tag
        id: tag
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "tag=ghcr.io/${{ github.repository }}:${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=ghcr.io/${{ github.repository }}:ci-${{ github.sha }}" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Dockerize with Voxen
        run: |
          java -jar cli/build/libs/voxen-*.jar --json dockerize \
            --tag "${{ steps.tag.outputs.tag }}" \
            --push \
            --platform linux/amd64,linux/arm64 \
            --lint
        shell: bash

      - name: Sign image with Cosign
        if: github.ref_type == 'tag'
        run: |
          cosign sign --yes "${{ steps.tag.outputs.tag }}"
        shell: bash

      - name: Generate SBOM with Syft
        continue-on-error: true
        run: |
          syft "${{ steps.tag.outputs.tag }}" -o cyclonedx-json > sbom.json
        shell: bash

      - name: Scan with Trivy
        id: trivy
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.tag.outputs.tag }}
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy results to GitHub Security
        if: always() && steps.trivy.outcome != 'failure'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
